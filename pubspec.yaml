name: adhikar
description: Government Welfare Scheme Navigator for Rural India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  
  # Voice & Speech
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  
  # Google Services (Firebase-Only Architecture)
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  cloud_functions: ^6.2.0
  google_mlkit_language_id: ^0.13.1
  google_mlkit_text_recognition: ^0.15.1
  
  # Networking (offline detection only)
  connectivity_plus: ^7.1.1
  
  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  google_fonts: ^8.0.2
  fl_chart: ^1.2.0
  
  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2
  
  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  permission_handler: ^12.0.1
  dio: ^5.4.0
  url_launcher: ^6.2.4
  share_plus: ^10.1.4
  package_info_plus: ^9.0.0

  
  # PDF generation for forms
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env
    - assets/animations/
    - assets/images/
    - assets/icons/
  generate: true
