name: adhikar
description: Government Welfare Scheme Navigator for Rural India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  
  # Voice & Speech
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5
  
  # Google Services (Firebase-Only Architecture)
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.3
  firebase_storage: ^11.5.5
  firebase_messaging: ^14.7.8
  cloud_functions: ^4.6.0
  google_mlkit_language_id: ^0.10.0
  google_mlkit_text_recognition: ^0.11.0
  
  # Networking (offline detection only)
  connectivity_plus: ^5.0.2
  
  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  
  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  permission_handler: ^11.2.0
  
  # PDF generation for forms
  pdf: ^3.10.7
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/
